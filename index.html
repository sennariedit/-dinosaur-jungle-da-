<script>
// ============================================================
// JUNGLE BUGGY SURVIVAL - HIGH DETAIL EDITION
// ============================================================
window.onerror = function(msg, url, line) {
  document.body.innerHTML += `<div style="position:absolute;top:10px;left:10px;color:red;font-size:16px;background:rgba(255,255,255,0.8);padding:10px;z-index:9999;font-weight:bold;">ERROR: ${msg}<br>LINE: ${line}</div>`;
};
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const container = document.querySelector('.game-container');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const ratio = 800 / 260;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > ratio) w = h * ratio; else h = w / ratio;
  
  // Set stylistic CSS dimensions
  // Use game-container for visual width/height
  container.style.width = w + 'px';
  container.style.height = h + 'px';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  
  // Set real internal resolution scaled by High-DPI ratio
  canvas.width = 800 * dpr;
  canvas.height = 260 * dpr;
  
  // Reset context transform and scale it back to logical 800x260
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const W = 800, H = 260;
const GROUND_Y = 210;
const GRAVITY = 0.42;
const JUMP_VEL = -6.5;
const HIGH_JUMP_VEL = -11.5;

const COL_FAR = '#b0b8b9'; // Distant mountains
const COL_MID = '#7c8687'; // Jungle canopy
const COL_NEAR = '#434a4a'; // Foreground trees
const COL = '#212529'; // Main entity color (almost black)
const BG = '#e9ecef'; // Sky/background color

const START_SPEED = 2;
const MAX_SPEED = 11;
const SPEED_RAMP = 0.00025; // Slower acceleration

let state = 'title';
let isMuted = false;
let score = 0;
let highScore = 0;
try {
  highScore = parseInt(localStorage.getItem('jungleBuggyHS')) || 0;
} catch(e) { console.warn("localStorage not accessible."); }
let gameSpeed = START_SPEED;
let gameTime = 0;
let shakeTimer = 0, shakeIntensity = 0;

let darkness = 0;
let rainParticles = [];
let lightningFlash = 0;

// Stage Clear & Goal
let stageClearTimer = 0, celebrationTimer = 0, stageCleared = false;
const goldenEgg = { x: 0, y: 0, active: false, glow: 0 };
const fireworks = [], sparkles = [];
// Bonus Stage
let bonusScroll = 0, bonusScore = 0, bonusCoins = [], bonusCoinTimer = 0;
let bonusObstacles = [], bonusObstacleTimer = 0;

// ============================================================
// NOISE / MATH UTILS
// ============================================================
function seedRandom(seed) {
  return function() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
}

// ============================================================
// LAYER 1: MOUNTAINS (High Detail Jagged Peaks)
// ============================================================
const mountains = [];
function initMountains() {
  mountains.length = 0;
  for(let i=0; i<8; i++) {
    const w = 250 + Math.random() * 300;
    const h = 60 + Math.random() * 70;
    const pts = [];
    const steps = 30;
    for(let j=0; j<=steps; j++) {
      const p = j / steps;
      // Bell curve basic shape
      const curve = Math.sin(p * Math.PI);
      // Add jagged noise
      let ny = curve * h + (Math.random() - 0.5) * 15 * curve;
      if (j === 0 || j === steps) ny = 0;
      
      let rx = 0, ry = 0;
      if (ny > h * 0.5 && j % 3 === 1) { // High peaks only
        rx = Math.random()*10 - 5;
        ry = 10 + Math.random()*20;
      }
      pts.push({ x: p * w, y: ny, rx, ry });
    }
    mountains.push({ x: i * 180 - 100, w, h, pts });
  }
}

let scrollFar = 0;
function drawMountains() {
  ctx.fillStyle = COL_FAR;
  for (const m of mountains) {
    let mx = m.x - scrollFar;
    mx = ((mx % 1440) + 1440) % 1440;
    mx -= 300; // Safely wrap off-screen
    
    ctx.beginPath();
    ctx.moveTo(mx, GROUND_Y);
    for(let i=0; i<m.pts.length; i++) {
      ctx.lineTo(mx + m.pts[i].x, GROUND_Y - m.pts[i].y);
    }
    ctx.lineTo(mx + m.w, GROUND_Y);
    ctx.closePath();
    ctx.fill();
    
    // Mountain ridges (static interior lines)
    ctx.strokeStyle = BG; 
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=1; i<m.pts.length-1; i++) {
      if (m.pts[i].ry > 0) { 
        ctx.moveTo(mx + m.pts[i].x, GROUND_Y - m.pts[i].y);
        ctx.lineTo(mx + m.pts[i].x + m.pts[i].rx, GROUND_Y - m.pts[i].y + m.pts[i].ry);
      }
    }
    ctx.stroke();
  }
}

// ============================================================
// LAYER 2: JUNGLE CANOPY (Highly detailed foliage)
// ============================================================
const jungleMid = [];
function generateFoliageCluster(rx, ry, radius) {
  const points = [];
  const num = 14;
  for(let i=0; i<num; i++) {
    const angle = (i / num) * Math.PI * 2;
    const r = radius * (0.7 + Math.random() * 0.4);
    points.push({ x: rx + Math.cos(angle)*r, y: ry + Math.sin(angle)*r });
  }
  return points;
}

function initJungleMid() {
  jungleMid.length = 0;
  for(let i=0; i<25; i++) {
    const isPalm = Math.random() < 0.3;
    const h = 40 + Math.random() * 80;
    const w = 30 + Math.random() * 30;
    
    let parts = [];
    if (isPalm) {
      // Palm fronds
      for(let f=0; f<6; f++) {
        const angle = -Math.PI/2 + (Math.random()-0.5) * 2;
        parts.push({ type: 'frond', a: angle, len: 20 + Math.random()*15 });
      }
    } else {
      // Foliage blobs
      for(let b=0; b<3; b++) {
        const rx = (Math.random()-0.5)*w*0.8;
        const ry = -h + (Math.random()-0.5)*w*0.5;
        parts.push({ type: 'blob', pts: generateFoliageCluster(rx, ry, w*0.4) });
      }
    }
    jungleMid.push({ x: i * 45 - 50, h, w, isPalm, parts });
  }
}

let scrollMid = 0;
function drawJungleMid() {
  ctx.fillStyle = COL_MID;
  ctx.strokeStyle = COL_MID;
  
  for (const t of jungleMid) {
    let tx = t.x - scrollMid;
    tx = ((tx % 1125) + 1125) % 1125;
    tx -= 150;

    // Trunk
    ctx.lineWidth = t.isPalm ? 2 : 4 + Math.random()*3;
    ctx.beginPath();
    ctx.moveTo(tx, GROUND_Y);
    if(t.isPalm) {
      ctx.quadraticCurveTo(tx + 5, GROUND_Y - t.h/2, tx, GROUND_Y - t.h);
    } else {
      ctx.lineTo(tx, GROUND_Y - t.h * 0.8);
    }
    ctx.stroke();

    // Canopy
    if (t.isPalm) {
      ctx.lineWidth = 1.5;
      for(const p of t.parts) {
        ctx.beginPath();
        ctx.moveTo(tx, GROUND_Y - t.h);
        const ex = tx + Math.cos(p.a) * p.len;
        const ey = GROUND_Y - t.h + Math.sin(p.a) * p.len;
        ctx.quadraticCurveTo(tx + Math.cos(p.a)*p.len*0.5, ey + 10, ex, ey);
        ctx.stroke();
      }
    } else {
      for(const p of t.parts) {
        ctx.beginPath();
        ctx.moveTo(tx + p.pts[0].x, GROUND_Y + p.pts[0].y);
        for(let i=1; i<p.pts.length; i++) {
          ctx.lineTo(tx + p.pts[i].x, GROUND_Y + p.pts[i].y);
        }
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

// ============================================================
// LAYER 3: FOREGROUND JUNGLE (Dense Fern Clusters)
// ============================================================
const jungleNear = [];
function initJungleNear() {
  jungleNear.length = 0;
  for(let i=0; i<45; i++) { // Increased density (from 15 to 45)
    const h = 50 + Math.random() * 80;
    const isBig = Math.random() < 0.2;
    const bend = (Math.random() - 0.5) * 60; // Stem curved offset at top
    
    // Generate fern fronds (leaves matching stem curve)
    const fern = [];
    const fronds = 10 + Math.floor(Math.random()*8);
    for(let j=1; j<=fronds; j++) {
       const p = j / fronds;
       let len = isBig ? (20 + Math.random()*10) : (12 + Math.random()*8);
       len *= Math.sin(p * Math.PI); // Taper length at base and tip
       fern.push({ p, len });
    }
    jungleNear.push({ x: i * 25 - 50, h, isBig, bend, fern });
  }
}

let scrollNear = 0;
function drawJungleNear() {
  ctx.fillStyle = COL_NEAR;
  ctx.strokeStyle = COL_NEAR;
  
  for (const n of jungleNear) {
    let nx = n.x - scrollNear;
    nx = ((nx % 1125) + 1125) % 1125;
    nx -= 150;

    // Fern Stem
    ctx.lineWidth = n.isBig ? 2.5 : 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(nx, GROUND_Y);
    for(const f of n.fern) {
      const sx = nx + n.bend * Math.pow(f.p, 2);
      const sy = GROUND_Y - n.h * f.p;
      ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Little fronds branching off the stem
    ctx.lineWidth = n.isBig ? 1.5 : 1;
    ctx.beginPath();
    for(const f of n.fern) {
      const sx = nx + n.bend * Math.pow(f.p, 2);
      const sy = GROUND_Y - n.h * f.p;
      
      const downDrop = 4; // Leaves slightly droop down
      
      // left leaf
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(sx - f.len*0.6, sy - downDrop, sx - f.len, sy + downDrop);
      // right leaf
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(sx + f.len*0.6, sy - downDrop, sx + f.len, sy + downDrop);
    }
    ctx.stroke();
  }
}

// ============================================================
// GROUND DETAILED TEXTURE
// ============================================================
const groundDetails = [];
function initGround() {
  groundDetails.length = 0;
  for (let i = 0; i < 150; i++) {
    groundDetails.push({
      x: i * 7 + Math.random() * 5,
      y: GROUND_Y + 2 + Math.random() * 8,
      w: 1 + Math.random() * 4,
      isPebble: Math.random() < 0.2
    });
  }
}

function drawGround() {
  // Thick main ground line
  ctx.strokeStyle = COL;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Secondary uneven line
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 1.5);
  for(let i=0; i<W; i+=20) {
    ctx.lineTo(i, GROUND_Y + 1.5 + Math.sin(i + scrollNear)*1.5);
  }
  ctx.stroke();

  // Dirt particles / Grass tufts
  ctx.fillStyle = COL_MID;
  for (const d of groundDetails) {
    let dx = d.x - scrollNear;
    dx = ((dx % 1050) + 1050) % 1050;
    dx -= 50;
    
    if (d.isPebble) {
      ctx.fillRect(dx, d.y, d.w, d.w/2);
    } else {
      // Grass blade
      ctx.fillRect(dx, GROUND_Y - 2 - d.w, 1, d.w + 2);
    }
  }
}

// ============================================================
// LAYER 4: JUNGLE VERY NEAR (Foreground Silhouettes)
// ============================================================
const jungleVNear = [];
function initJungleVNear() {
  jungleVNear.length = 0;
  for(let i=0; i<8; i++) { // Very sparse placement
    const isTop = Math.random() > 0.5;
    const isVine = Math.random() > 0.5;
    jungleVNear.push({
      x: i * 400 + Math.random()*200,
      y: isTop ? 0 : H, 
      isTop: isTop,
      isVine: isVine,
      size: 40 + Math.random()*60, // Smaller size
      seed: Math.random()
    });
  }
}

let scrollVNear = 0;
function drawJungleVNear() {
  ctx.fillStyle = `rgba(33, 37, 41, 0.4)`; // More transparent, barely blocking vision
  ctx.strokeStyle = `rgba(33, 37, 41, 0.4)`;
  
  for (const n of jungleVNear) {
    let nx = n.x - scrollVNear;
    nx = ((nx % 3200) + 3200) % 3200;
    nx -= 400; // Wraps smoothly off-screen left
    
    if (n.isVine && n.isTop) {
      // Swirly hanging vine with small leaves
      ctx.lineWidth = 3 + n.size * 0.04;
      ctx.lineCap = 'round';
      ctx.beginPath();
      let vx = nx, vy = -10;
      ctx.moveTo(vx, vy);
      for(let step=1; step<=5; step++) {
         let pct = step/5;
         let wave = Math.sin(pct * Math.PI * 3 + n.seed * 10) * 15;
         ctx.quadraticCurveTo(vx + wave, vy + n.size*0.2, nx + wave*0.5, -10 + n.size*pct);
         vx = nx + wave*0.5;
         vy = -10 + n.size*pct;
      }
      ctx.stroke();

      for(let step=1; step<=4; step++) {
         let pct = step/5;
         let leafY = -10 + n.size*pct;
         let wave = Math.sin(pct * Math.PI * 3 + n.seed * 10) * 15;
         let leafX = nx + wave*0.5;
         ctx.beginPath();
         ctx.ellipse(leafX + 6, leafY, 10, 4, 0.5, 0, Math.PI*2);
         ctx.fill();
         ctx.beginPath();
         ctx.ellipse(leafX - 6, leafY + 6, 8, 3, -0.5, 0, Math.PI*2);
         ctx.fill();
      }
    } else {
      // Giant foreground fern / palm stem
      ctx.lineWidth = 5 + n.size * 0.02;
      ctx.beginPath();
      const startY = n.isTop ? -20 : H + 20;
      const endY = n.isTop ? n.size : H - n.size;
      const ctrlY = n.isTop ? n.size*0.5 : H - n.size*0.5;
      const bendX = nx + (n.seed - 0.5) * 150;
      
      ctx.moveTo(nx, startY);
      ctx.quadraticCurveTo(nx, ctrlY, bendX, endY);
      ctx.stroke();
      
      // Giant lateral fronds
      const fronds = 10;
      ctx.lineWidth = 2 + n.size * 0.02;
      ctx.beginPath();
      for(let f=1; f<=fronds; f++) {
        let p = f/fronds;
        let om = 1 - p;
        let sx = om*om*nx + 2*om*p*nx + p*p*bendX;
        let sy = om*om*startY + 2*om*p*ctrlY + p*p*endY;
        
        let flen = 15 + Math.sin(p * Math.PI) * n.size * 0.5;
        let drop = n.isTop ? 15 : -20; // Fronds drape
        
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(sx + flen*0.5, sy + drop*0.5, sx + flen, sy + drop);
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(sx - flen*0.5, sy + drop*0.5, sx - flen, sy + drop);
      }
      ctx.stroke();
    }
  }
}

// ============================================================
// DUST PARTICLES (Smoke puffs)
// ============================================================
const dust = [];
function spawnDust(x, y, isHeavy = false) {
  const count = isHeavy ? 3 : 1;
  for(let i=0; i<count; i++) {
    dust.push({ 
      x: x + Math.random()*8-4, 
      y: y + Math.random()*4-2, 
      vx: -gameSpeed*0.4 - Math.random()*1, 
      vy: -Math.random()*0.8 - 0.2, 
      life: 1,
      size: 2 + Math.random()*4
    });
  }
}

function updateDust() {
  for (let i = dust.length - 1; i >= 0; i--) {
    const p = dust[i];
    p.x += p.vx; p.y += p.vy; p.size += 0.15; p.life -= 0.03;
    if (p.life <= 0) { dust[i] = dust[dust.length - 1]; dust.pop(); }
  }
}

function drawDust() {
  for (const p of dust) {
    ctx.globalAlpha = p.life * 0.35;
    ctx.fillStyle = COL;
    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// BUGGY – ULTRA DETAIL MRAP
// ============================================================
let dashRequested = false;
const buggy = { x: 100, y: GROUND_Y, vy: 0, grounded: true, jumpHeld: false, jumpTime: 0, wheelAngle: 0, dashActive: 0, canDash: false };

function resetBuggy() {
  buggy.x = 120;
  buggy.y = GROUND_Y; buggy.vy = 0; buggy.grounded = true;
  buggy.jumpHeld = false; buggy.jumpTime = 0; buggy.wheelAngle = 0;
  buggy.dashActive = 0; buggy.canDash = false; dashRequested = false;
}

function getFloorY() {
  const bL = buggy.x - 10, bR = buggy.x + 15; // Exact wheel footprint (scaled)
  let floor = GROUND_Y;
  for (const o of obstacles) {
    const oL = o.x - o.w * 0.5 + 4, oR = o.x + o.w * 0.5 - 4;
    const oT = o.y - o.h;
    if (bR > oL && bL < oR && buggy.y <= oT + Math.max(12, buggy.vy + 2)) {
      floor = Math.min(floor, oT);
    }
  }
  return floor;
}

function updateBuggy() {
  if (dashRequested && buggy.canDash) {
    buggy.canDash = false; dashRequested = false;
    buggy.dashActive = 20; // Lasts 20 frames
    buggy.vy = -1.0; // Stall momentum upward slightly 
    if (typeof playDash === 'function') playDash();
  }
  if (buggy.dashActive > 0) {
    buggy.dashActive--;
    buggy.vy = 0; // Float horizontally while dashing!
    buggy.x += 4.5; // Surge forward powerfully
    // Massive jet stream particle blast
    dust.push({ x: buggy.x - 30, y: buggy.y - 8 + Math.random()*6, vx: -6 - Math.random()*2, vy: (Math.random()-0.5)*0.5, life: 1.2, size: 4 });
    // T-Rex gets blinded/outrun by the nitro and pushed vigorously back!
    if (trex.active) trex.x -= 3.0; 
  }

  const buggyTargetX = trex.active ? 300 : 120; // Try to escape forward under pressure!
  
  if (buggy.x < buggyTargetX && state === 'playing') {
    // Escaping speed increased slightly so players have an honest chance to outrun the beast
    const recoverySpeed = trex.active ? 1.0 : 1.5; 
    buggy.x += recoverySpeed; 
    if (buggy.x > buggyTargetX) buggy.x = buggyTargetX;
  }
  if (buggy.x > buggyTargetX && state === 'playing') {
    buggy.x -= 1.0;
    if (buggy.x < buggyTargetX) buggy.x = buggyTargetX;
  }
  
  const floorY = getFloorY();
  
  // Start falling if we drove off a ledge
  if (buggy.y < floorY && buggy.grounded) {
    buggy.grounded = false;
  }

  if (!buggy.grounded) {
    buggy.vy += GRAVITY;
    buggy.y += buggy.vy;
    if (!buggy.jumpHeld && buggy.vy < -3) buggy.vy = -3;
  }
  
  if (buggy.y >= floorY && buggy.vy >= 0) {
    if (!buggy.grounded) {
      // Landed
      spawnDust(buggy.x - 20, floorY, true);
      spawnDust(buggy.x + 28, floorY, true);
    }
    buggy.y = floorY; 
    buggy.vy = 0; 
    buggy.grounded = true;
  }
  
  buggy.wheelAngle += gameSpeed * 0.16;
  if (buggy.grounded && state === 'playing' && gameTime % 3 === 0) {
    spawnDust(buggy.x - 22, buggy.y - 2);
    // Exhaust puff
    if(gameTime % 15 === 0) {
      dust.push({ x: buggy.x - 28, y: buggy.y - 12, vx: -2, vy: -1.5, life: 1, size: 2 });
    }
  }
}

function drawBuggy() {
  const bx = buggy.x, by = buggy.y;
  // Suspension dynamics
  const bounceY = buggy.grounded ? Math.sin(gameTime * 0.4) * 0.7 : 0;
  const pitch = buggy.grounded ? Math.sin(gameTime * 0.3) * 0.02 : (buggy.vy * 0.015);

  ctx.save();
  ctx.translate(bx, by);
  ctx.scale(0.55, 0.55); // Scaled down further (was 0.8)
  
  // Draw wheels (fixed to ground Y relative logic)
  const wr = 10;
  const wheelBase = 26;
  
  // Wheel rendering helper
  const drawDetailedWheel = (ox, oy) => {
    ctx.save();
    ctx.translate(ox, oy);
    
    // Tire body
    ctx.fillStyle = COL;
    ctx.beginPath(); ctx.arc(0, 0, wr, 0, Math.PI*2); ctx.fill();
    
    // Knobby tread blocks
    ctx.fillStyle = COL;
    for(let i=0; i<12; i++) {
      const a = buggy.wheelAngle + (i * Math.PI) / 6;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*(wr-1), Math.sin(a)*(wr-1), 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    
    // Inner rim
    ctx.fillStyle = BG;
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = COL;
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = BG;
    ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.fill();

    // 8 Lug nuts
    ctx.fillStyle = COL;
    for(let i=0; i<8; i++) {
        const a = buggy.wheelAngle + (i * Math.PI*2)/8;
        ctx.fillRect(Math.cos(a)*3.5 - 0.5, Math.sin(a)*3.5 - 0.5, 1, 1);
    }
    ctx.restore();
  };

  // Draw Wheels (they don't pitch with the body, only bounce slightly less)
  drawDetailedWheel(-wheelBase + 4, -wr + bounceY*0.5);
  drawDetailedWheel(wheelBase, -wr + bounceY*0.5);

  // Apply body pitch and bounce
  ctx.rotate(pitch);
  ctx.translate(0, bounceY);

  ctx.fillStyle = COL;
  ctx.strokeStyle = COL;
  ctx.lineWidth = 1;

  // ==== Suspension Springs ====
  ctx.strokeStyle = COL_MID;
  ctx.lineWidth = 1.5;
  // Rear coil
  ctx.beginPath();
  ctx.moveTo(-wheelBase + 4, -wr);
  for(let i=0; i<5; i++) { ctx.lineTo(-wheelBase + 4 + (i%2==0?2:-2), -wr - 4 - i*1.5); }
  ctx.stroke();
  // Front coil
  ctx.beginPath();
  ctx.moveTo(wheelBase, -wr);
  for(let i=0; i<5; i++) { ctx.lineTo(wheelBase + (i%2==0?2:-2), -wr - 4 - i*1.5); }
  ctx.stroke();
  ctx.strokeStyle = COL;

  // ==== MAIN V-HULL ARMORED BODY ====
  ctx.fillStyle = COL;
  ctx.beginPath();
  ctx.moveTo(-30, -12); // Rear bumper
  ctx.lineTo(-28, -22); // Rear hatch slope
  ctx.lineTo(-26, -38); // Rear top
  ctx.lineTo(-4, -40);  // Roof flat
  ctx.lineTo(8, -40);   // Roof flat
  ctx.lineTo(18, -32);  // Windshield slope
  ctx.lineTo(32, -22);  // Hood nose
  ctx.lineTo(36, -18);  // Bull bar front
  ctx.lineTo(35, -12);  // Lower bull bar
  ctx.lineTo(26, -10);  // Lower frontal armor
  ctx.lineTo(14, -10);  // Chassis flat
  ctx.lineTo(0, -5);    // V-hull dip (mine deflection)
  ctx.lineTo(-14, -10); // Chassis rear flat
  ctx.lineTo(-26, -10);
  ctx.closePath();
  ctx.fill();

  // ==== Armored Windows (BG cutout) ====
  ctx.fillStyle = BG;
  // Windshield (Heavy frames)
  ctx.beginPath();
  ctx.moveTo(11, -36);
  ctx.lineTo(17, -29);
  ctx.lineTo(24, -22);
  ctx.lineTo(23, -20);
  ctx.lineTo(15, -27);
  ctx.lineTo(9, -34);
  ctx.closePath();
  ctx.fill();

  // Side Window (Driver)
  ctx.fillRect(0, -32, 7, 5);
  // Side Window (Passenger)
  ctx.fillRect(-12, -32, 8, 5);

  // ==== Panel Lines & Hatches (BG lines) ====
  ctx.strokeStyle = BG;
  ctx.lineWidth = 1;
  // Door outline
  ctx.beginPath(); ctx.moveTo(-2, -37); ctx.lineTo(-2, -12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -34); ctx.lineTo(8, -16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2, -12); ctx.lineTo(8, -16); ctx.stroke(); // Door bottom angle
  
  // V-hull plate separation
  ctx.beginPath(); ctx.moveTo(-22, -14); ctx.lineTo(18, -14); ctx.stroke();

  // Engine Hood vents
  for(let i=21; i<29; i+=2) {
    ctx.beginPath(); ctx.moveTo(i, -24); ctx.lineTo(i+1, -22); ctx.stroke();
  }

  // ==== External Details (COL additions) ====
  ctx.fillStyle = COL;
  ctx.strokeStyle = COL;

  // Wheel arches (thick armor)
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-wheelBase + 4, -wr, wr + 4, Math.PI, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(wheelBase, -wr, wr + 4, Math.PI, 0); ctx.stroke();

  // Bull Bar (Grill guard) - intricate pipes
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(34, -12); ctx.lineTo(38, -14); ctx.lineTo(38, -22); ctx.lineTo(34, -24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(38, -18); ctx.lineTo(32, -18); ctx.stroke();

  // Side mirror
  ctx.fillRect(9, -30, 2, 4);
  ctx.beginPath(); ctx.moveTo(8, -28); ctx.lineTo(10, -28); ctx.stroke();

  // Side steps / ladder
  ctx.fillRect(0, -10, 8, 2);
  ctx.fillRect(2, -12, 1, 2); ctx.fillRect(6, -12, 1, 2);

  // Exhaust pipe (elevated snag-free)
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-26, -14); ctx.lineTo(-30, -14); ctx.lineTo(-30, -9); ctx.stroke();

  // ==== High-Detail Turret (CROWS / Machine Gun) ====
  ctx.fillRect(-10, -42, 14, 2); // Base ring
  ctx.fillRect(-6, -46, 10, 4);  // Mount
  // Ammo box
  ctx.fillRect(-12, -48, 6, 5); 
  // Gun Body & Barrel
  ctx.fillRect(-4, -49, 18, 2.5); // Receiver
  ctx.fillRect(14, -48.5, 12, 1.5); // Barrel
  // Muzzle Flash hider
  ctx.fillRect(26, -49, 3, 3);
  // Optics / Sensor pod
  ctx.fillRect(2, -52, 4, 3);
  ctx.fillStyle = BG;
  ctx.fillRect(4, -51, 2, 1); // Lens glint
  ctx.fillStyle = COL;

  // ==== Dual Antennas ====
  ctx.lineWidth = 1;
  // Rear whip antenna (bends back in motion)
  ctx.beginPath();
  ctx.moveTo(-18, -37);
  ctx.quadraticCurveTo(-22, -55, -28, -65);
  ctx.stroke();
  // Comm box
  ctx.fillRect(-20, -39, 4, 3);

  // Front dome antenna
  ctx.fillRect(-1, -43, 2, 3);

  // ==== Rivets ====
  ctx.fillStyle = BG;
  for(let i=-26; i<32; i+=4) {
    if(i !== -2 && i !== 8 && i !== -10 && i !== 0) { // skip lines/doors
      ctx.fillRect(i, -17, 1, 1);
    }
  }

  // ==== Internal Driver (Helmet profile) ====
  ctx.fillStyle = COL;
  ctx.fillRect(2, -31, 3, 3); // Helmet
  ctx.fillRect(3, -29, 2, 1); // Shoulder

  // ==== Lights ====
  // Headlight (on)
  ctx.fillStyle = BG;
  ctx.fillRect(34, -20, 2, 3);
  // Tail light
  ctx.fillRect(-29, -18, 1.5, 3);

  ctx.restore();
}

// OBSTACLES (High detail rocks & splintered logs)
// ============================================================
const obstacles = [];
let obstacleTimer = 0;

function spawnObstacle() {
  const r = Math.random();
  const raptorUnlocked = score >= 200; // Raptors only after score 200
  
  if (r < 0.25) {
    obstacles.push({ type: 'rock', x: W + 30, y: GROUND_Y, w: 14, h: 18, seed: Math.random() });
  } else if (r < 0.5) {
    obstacles.push({ type: 'rock', x: W + 30, y: GROUND_Y, w: 22, h: 26, seed: Math.random() });
  } else if (r < 0.8 || !raptorUnlocked) {
    obstacles.push({ type: 'log', x: W + 30, y: GROUND_Y, w: 34, h: 14, seed: Math.random() });
  } else {
    // Raptor running towards the Buggy!
    obstacles.push({ type: 'raptor', x: W + 40, y: GROUND_Y, w: 24, h: 18, seed: Math.random(), animOffset: Math.random() * 100 });
  }
}

function updateObstacles() {
  obstacleTimer -= gameSpeed;
  if (obstacleTimer <= 0) {
    spawnObstacle();
    const progress = Math.min(gameTime / 6000, 1);
    const minGap = 350 - progress * 200;
    const randGap = 250 - progress * 150;
    obstacleTimer = minGap + Math.random() * randGap;
  }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= (o.type === 'raptor') ? gameSpeed * 1.6 : gameSpeed; // Sprinting forward!
    if (o.type === 'raptor' && Math.random() < 0.1) spawnDust(o.x + 10, o.y, true);
    if (o.x < -60) obstacles.splice(i, 1);
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    ctx.save();
    ctx.translate(o.x, o.y);
    const rand = seedRandom(o.seed);
    
    if (o.type === 'rock') {
      ctx.fillStyle = COL;
      ctx.beginPath();
      ctx.moveTo(-o.w/2, 0);
      
      // Jagged perimeter
      const pts = 8;
      for(let i=1; i<pts; i++) {
        const theta = Math.PI - (i/pts) * Math.PI;
        const rad = (o.w/2) * (0.6 + rand()*0.5);
        ctx.lineTo(Math.cos(theta)*rad, -Math.sin(theta)*(o.h));
      }
      ctx.lineTo(o.w/2, 0);
      ctx.closePath();
      ctx.fill();

      // Rock fissures (lines)
      ctx.strokeStyle = BG;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-o.w*0.2, -o.h*0.5);
      ctx.lineTo(o.w*0.1, -o.h*0.2);
      ctx.moveTo(o.w*0.2, -o.h*0.7);
      ctx.lineTo(o.w*0.1, -o.h*0.4);
      ctx.stroke();

    } else if (o.type === 'log') {
      // Splintered Log
      ctx.fillStyle = COL;
      // Main trunk
      ctx.beginPath();
      ctx.moveTo(-o.w/2, 0);
      ctx.lineTo(-o.w/2 + 2, -o.h);
      ctx.lineTo(o.w/2 - Math.random()*5, -o.h + 2); // Uneven top
      ctx.lineTo(o.w/2, 0);
      ctx.closePath();
      ctx.fill();

      // Splinters on the edges
      ctx.beginPath(); ctx.moveTo(-o.w/2+2, -o.h); ctx.lineTo(-o.w/2-3, -o.h-4); ctx.lineTo(-o.w/2+5, -o.h+1); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w/2, -o.h+2); ctx.lineTo(o.w/2+4, -o.h-2); ctx.lineTo(o.w/2-2, -o.h+4); ctx.fill();

      // Broken branches
      const bx1 = -o.w*0.2; ctx.fillRect(bx1, -o.h-6, 4, 6);
      ctx.beginPath(); ctx.moveTo(bx1, -o.h-6); ctx.lineTo(bx1-3, -o.h-10); ctx.lineTo(bx1+2, -o.h-6); ctx.fill();

      const bx2 = o.w*0.2; ctx.fillRect(bx2, -o.h-8, 3, 8);
      ctx.beginPath(); ctx.moveTo(bx2+3, -o.h-8); ctx.lineTo(bx2+6, -o.h-12); ctx.lineTo(bx2+1, -o.h-8); ctx.fill();

      // Bark texture lines
      ctx.strokeStyle = BG;
      ctx.lineWidth = 1;
      for(let i=0; i<3; i++) {
        ctx.beginPath();
        const lx = -o.w*0.4 + rand()*o.w*0.8;
        ctx.moveTo(lx, -o.h*0.9);
        ctx.lineTo(lx, -o.h*0.1);
        ctx.stroke();
      }
    } else if (o.type === 'raptor') {
      ctx.fillStyle = COL;
      const r_time = gameTime + o.animOffset;
      const stride = Math.sin(r_time * 0.35) * 0.8;
      const bobY = Math.abs(Math.sin(r_time * 0.35)) * 4;
      
      ctx.translate(0, -bobY);

      const drawRapLeg = (rot) => {
        ctx.save();
        ctx.translate(2, -9);
        ctx.rotate(rot);
        ctx.beginPath();
        ctx.moveTo(0, 0); // hip
        ctx.quadraticCurveTo(6, 4, -4, 10); // thigh->knee->ankle
        ctx.lineTo(0, 10); // claw
        ctx.strokeStyle = COL; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.restore();
      };

      drawRapLeg(-stride); // Far leg
      
      // Raptor Body
      ctx.beginPath();
      ctx.moveTo(-18, -14); // Snout 
      ctx.lineTo(-12, -18); // Head dome
      ctx.lineTo(-6, -11); // Neck dip
      ctx.quadraticCurveTo(8, -12, 22, -9 + (stride*2)); // Tail flip
      ctx.quadraticCurveTo(10, -3, 4, -3); // Lower tail
      ctx.quadraticCurveTo(-4, 2, -6, -5); // Belly
      ctx.lineTo(-12, -7); // Jaw
      ctx.fill();

      // Tiny arms
      ctx.beginPath(); ctx.moveTo(-6, -7); ctx.quadraticCurveTo(-10, -3, -8, -1);
      ctx.strokeStyle = COL; ctx.lineWidth = 1.5; ctx.stroke();
      
      // Glaring Eye
      ctx.fillStyle = BG;
      ctx.fillRect(-15, -15, 2, 1.5);
      
      drawRapLeg(stride); // Near leg
    }
    ctx.restore();
  }
}

// PTERODACTYLS (High Detail Silhouette)
// ============================================================
const pterodactyls = [];
let pteroTimer = 500;

function spawnPterodactyl() {
  const high = Math.random() < 0.5;
  pterodactyls.push({
    x: W + 60,
    y: high ? 50 + Math.random() * 30 : 130 + Math.random() * 30,
    vx: -(gameSpeed * 0.8 + Math.random() * 1.5),
    vy: 0.1 + Math.random() * 0.2,
    wing: Math.random() * Math.PI * 2,
  });
}

function updatePterodactyls() {
  pteroTimer -= 1;
  const rate = Math.max(200, 500 - gameTime * 0.025);
  if (pteroTimer <= 0) { // Active immediately from score 0
    spawnPterodactyl();
    pteroTimer = rate + Math.random() * 150;
  }
  for (let i = pterodactyls.length - 1; i >= 0; i--) {
    const p = pterodactyls[i];
    p.x += p.vx; p.y += p.vy; p.wing += 0.12;
    if (p.x < -60 || p.y > H + 20) pterodactyls.splice(i, 1);
  }
}

function drawPterodactyls() {
  ctx.fillStyle = COL;
  for (const p of pterodactyls) {
    const wy = Math.sin(p.wing); // Stroke depth
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(0.65, 0.65);
    
    // Add flight tilt
    ctx.rotate(p.vy * 0.5);

    // Far Wing (Back) - drawn slightly smaller and with less amplitude
    ctx.beginPath();
    ctx.moveTo(4, 3);
    ctx.quadraticCurveTo(8 - wy*3, -12 + wy*8, 20 - wy*4, -8 + wy*12);
    ctx.quadraticCurveTo(12, -2, 6, 2);
    ctx.fill();

    // Body & Head (Facing Left)
    ctx.beginPath();
    ctx.moveTo(6, 6); // Belly
    ctx.lineTo(-2, 7); // Chest
    ctx.quadraticCurveTo(-12, 8, -18, -2); // Lower neck
    ctx.lineTo(-38, 2); // Lower beak tip
    ctx.lineTo(-36, 0); 
    ctx.lineTo(-20, -1); // Mouth corner
    ctx.lineTo(-44, -3); // Upper beak tip
    ctx.lineTo(-40, -5);
    ctx.lineTo(-18, -4); // Top of head
    ctx.lineTo(-2, -16); // Crest tip
    ctx.lineTo(-6, -4); // Back of neck
    ctx.quadraticCurveTo(8, -2, 14, 0); // Back
    ctx.lineTo(26, -3); // Leg tip 1 (claws)
    ctx.lineTo(25, -1);
    ctx.lineTo(30, +1); // Leg tip 2 (claws)
    ctx.lineTo(28, +2);
    ctx.lineTo(22, +2); // Thigh
    ctx.quadraticCurveTo(14, 8, 6, 6); // Underbelly
    ctx.fill();

    // Eye cut-out
    ctx.fillStyle = BG;
    ctx.beginPath(); ctx.arc(-16, -2, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = COL;

    // Near Wing (Front) - massive, pointed bat wing
    ctx.beginPath();
    ctx.moveTo(0, 3); // Shoulder
    // Wing Leading Edge (bone)
    ctx.quadraticCurveTo(-8 - wy*8, -6 + wy*20, 10 - wy*10, -4 + wy*28);
    // Wing Trailing Edge (membrane) with a slight curve
    ctx.quadraticCurveTo(12, 2, 4, 8);
    ctx.fill();

    // Wing bone detail (finger bone)
    if(wy < 0) { // Visible on upstroke
      ctx.strokeStyle = BG;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0,3);
      ctx.lineTo(-4 - wy*4, -2 + wy*10);
      ctx.stroke();
    }

    ctx.restore();
  }
}

// ============================================================
// T-REX (High Detail Silhouette)
// ============================================================
const trex = { x: -200, active: false, speed: 0, jawAngle: 0, jawDir: 1, stayTimer: 0, lastSpawnScore: 0, targetSpawnScore: 50 };

function resetTrex() {
  trex.x = -200; trex.active = false; trex.speed = 0;
  trex.stayTimer = 0; 
  trex.lastSpawnScore = 500;
  // First spawn safely between score 500 and 550
  trex.targetSpawnScore = 500 + Math.floor(Math.random() * 50);
}

function updateTrex() {
  if (!trex.active && score >= 500) { // Unlocks at 500
    // Evaluate stochastic spawn offset vs strict 300 bounds
    let timeToSpawn = (score >= trex.targetSpawnScore);
    let forcedSpawn = (score - trex.lastSpawnScore) >= 290;

    if (timeToSpawn || forcedSpawn) {
      trex.active = true; trex.x = -220;
      trex.speed = gameSpeed * 0.35 + Math.random() * 1.5; // Randomize pursuit velocity
      trex.stayTimer = 200 + Math.random() * 300;
      trex.lastSpawnScore = score;
      if (typeof playTrexRoar === 'function') playTrexRoar();
    }
  }

  if (trex.active) {
    let targetX = buggy.x - 220; // Dynamic tracking! Stay safely behind normally
    // Is the predator in the striking phase?
    const isBitingPhase = trex.stayTimer > 0 && trex.stayTimer < 150 && Math.sin(gameTime * 0.1) > 0;
    
    if (isBitingPhase) targetX = buggy.x - 110; // Terrifying snap forward to bite inches from bumper!

    // Smooth movement towards dynamic target
    if (trex.x < targetX) {
      trex.x += isBitingPhase ? gameSpeed * 0.8 : (trex.speed + gameSpeed * 0.2);
    } else if (trex.x > targetX) {
      trex.x -= gameSpeed * 0.4; // Drift backwards heavily after lunge recovers
    }

    if (trex.x > 75) {
      trex.stayTimer -= 1;
      if (!isBitingPhase) trex.x += Math.sin(gameTime * 0.08) * 5; // Ambient bobbing when waiting
    }
    // Jaw snapping
    trex.jawAngle += 1.2 * trex.jawDir;
    if (trex.jawAngle > 15) trex.jawDir = -1;
    if (trex.jawAngle < 0) trex.jawDir = 1;
    
    if (trex.stayTimer <= 0) {
      trex.x -= gameSpeed * 0.6;
      if (trex.x < -250) {
        trex.active = false;
        // Randomly target next spawn precisely between 80 and 260 score later
        trex.targetSpawnScore = score + Math.floor(Math.random() * 180) + 80;
      }
    }
    
    // Refined collision check (Head and Chest/Body boxes)
    if (trex.active && trex.stayTimer > 0) {
      const bL = buggy.x - 15, bR = buggy.x + 20;
      const bT = buggy.y - 26, bB = buggy.y;
      const tx = trex.x, ty = GROUND_Y - 26;
      
      // 1. Head/Snout box (TX is Neck Top)
      const hL = tx, hR = tx + 75;
      const hT = ty - 38, hB = ty + 25;
      
      // 2. Chest/Legs box
      const cL = tx - 90, cR = tx;
      const cT = ty - 25, cB = ty + 40;

      const hitHead = (bR > hL && bL < hR && bB > hT && bT < hB);
      const hitChest = (bR > cL && bL < cR && bB > cT && bT < cB);
      
      if (hitHead || hitChest) triggerGameOver();
    }
  }
}

const trexRunFrames = [];
const trexBiteFrames = [];

function processTrexGeneration(isBiting, frameArray) {
  const frames = 8;
  for (let i = 0; i < frames; i++) {
    const cycle = i / frames;
    const canvas = document.createElement('canvas');
    canvas.width = 600;
    canvas.height = 400;
    const tCtx = canvas.getContext('2d');
    
    // Set Center of action representing the Top of the Neck (base of skull)
    const cx = 400; 
    const cy = 180; 
    const bob = Math.sin(cycle * Math.PI * 4) * 6; // running bounce
    const JawAngle = isBiting ? 25 + Math.sin(cycle * Math.PI * 8) * 10 : 0;
    
    // Leg swinging
    const rightLegRot = Math.sin(cycle * Math.PI * 2) * 0.6;
    const leftLegRot = Math.sin((cycle + 0.5) * Math.PI * 2) * 0.6;
    
    tCtx.translate(cx, cy + bob);
    tCtx.scale(0.9, 0.9); 
    
    const C_MAIN = COL; 
    const C_BACK = '#161a1d'; // Darker inner leg
    const C_BG = BG;   
    
    const drawLeg = (rot, color) => {
       tCtx.save();
       // Hip Joint translated relative to Neck Top(0,0)
       tCtx.translate(-150, 60); 
       tCtx.rotate(rot);
       tCtx.fillStyle = color;
       // Thigh
       tCtx.beginPath();
       tCtx.moveTo(-20, -20);
       tCtx.quadraticCurveTo(30, -30, 40, 20); 
       tCtx.quadraticCurveTo(20, 80, -10, 80); // knee back
       tCtx.quadraticCurveTo(-40, 60, -20, -20); // return to hip
       tCtx.fill();
       
       // Calf (Knee Joint translated relative to Hip)
       tCtx.translate(-10, 80);
       tCtx.rotate(-rot * 0.8 + 0.2); 
       tCtx.beginPath();
       tCtx.moveTo(-15, -10); tCtx.lineTo(15, -10); // Knee width
       tCtx.quadraticCurveTo(15, 40, -5, 60); // Ankle front
       tCtx.quadraticCurveTo(-20, 40, -15, -10); // Ankle back
       tCtx.fill();
       
       // Foot (Ankle Joint relative to Calf)
       tCtx.translate(-5, 60);
       tCtx.beginPath();
       tCtx.moveTo(-10, 0); // heel connection
       tCtx.lineTo(25, 10); tCtx.lineTo(15, 20); // Toe 1
       tCtx.lineTo(0, 15);
       tCtx.lineTo(10, 25); tCtx.lineTo(0, 28);  // Toe 2
       tCtx.lineTo(-20, 15); // heel tip
       tCtx.fill();
       tCtx.restore();
    };

    // Draw Back Leg
    drawLeg(leftLegRot, C_BACK);

    const tailSway = Math.sin(cycle * Math.PI * 2) * 15;
    tCtx.fillStyle = C_MAIN;
    
    // Draw Unified Body (Neck, Torso, Tail)
    tCtx.beginPath();
    tCtx.moveTo(0, -30); // Top of neck
    // Back curving down to hips
    tCtx.quadraticCurveTo(-60, -20, -120, -10);
    tCtx.quadraticCurveTo(-150, -5, -180, 0); 
    // Tail top curve
    tCtx.quadraticCurveTo(-300, -20, -360, -20 + tailSway);
    // Tail bottom curve returning to hips
    tCtx.quadraticCurveTo(-250, 60, -150, 80);
    // Belly curving to Chest
    tCtx.quadraticCurveTo(-100, 120, -50, 80);
    // Chest curving to Lower Neck
    tCtx.quadraticCurveTo(-20, 60, 0, 30);
    tCtx.closePath();
    tCtx.fill();

    // Spikes (aligned with Spine curve)
    tCtx.beginPath();
    for(let j=0; j>=-180; j-=12) {
       let sy = -30 - (j / 180) * 30; // linear approx of back slope
       let spikeH = 10 + Math.random()*6;
       tCtx.moveTo(j, sy + 2);
       tCtx.lineTo(j - 6, sy - spikeH);
       tCtx.lineTo(j + 4, sy + 2);
    }
    tCtx.fill();
    
    // Neck wrinkles (Texture)
    tCtx.strokeStyle = C_BG;
    tCtx.lineWidth = 1.5;
    for(let j=0; j<4; j++) {
       tCtx.beginPath();
       let rx = -20 - j*20;
       let ry = -10 + j*10;
       tCtx.moveTo(rx, ry);
       tCtx.quadraticCurveTo(rx - 15, ry + 20, rx, ry + 40);
       tCtx.stroke();
    }

    // Tiny Arm (Attached at Shoulder)
    tCtx.beginPath();
    tCtx.moveTo(-50, 50); // Shoulder
    tCtx.lineTo(-30, 75); // Elbow outer
    tCtx.lineTo(-10, 65); // Wrist
    tCtx.lineTo(-2, 70); tCtx.lineTo(-8, 62); // Claw 1
    tCtx.lineTo(0, 58); tCtx.lineTo(-15, 60); // Claw 2
    tCtx.lineTo(-35, 65); // elbow inner
    tCtx.lineTo(-60, 40); // return to shoulder
    tCtx.fill();

    // ==== UPPER SKULL ==== (Exactly the same perfectly proven path)
    tCtx.beginPath();
    tCtx.moveTo(0, -30); 
    tCtx.quadraticCurveTo(30, -45, 55, -35); 
    tCtx.lineTo(85, -20); 
    tCtx.lineTo(95, -15); 
    tCtx.lineTo(98, 0); 
    tCtx.quadraticCurveTo(80, -5, 55, 5); 
    tCtx.lineTo(0, 10); 
    tCtx.closePath();
    tCtx.fill();
    
    // Brow Horn/Ridge detail
    tCtx.beginPath(); tCtx.moveTo(40, -38); tCtx.lineTo(48, -50); tCtx.lineTo(60, -35); tCtx.fill();
    tCtx.beginPath(); tCtx.moveTo(75, -23); tCtx.lineTo(80, -28); tCtx.lineTo(88, -18); tCtx.fill();

    // Upper Teeth
    tCtx.fillStyle = C_BG;
    for (let j = 10; j < 95; j += 10) {
      tCtx.beginPath(); tCtx.moveTo(j, 2); tCtx.lineTo(j+2, 12); tCtx.lineTo(j+5, 2); tCtx.fill();
    }

    // ==== LOWER JAW ====
    tCtx.save();
    tCtx.translate(0, 10);
    tCtx.rotate((JawAngle * Math.PI) / 180);
    
    tCtx.fillStyle = C_MAIN;
    tCtx.beginPath();
    tCtx.moveTo(0, 0); tCtx.lineTo(85, 2); tCtx.lineTo(75, 15); 
    tCtx.quadraticCurveTo(40, 25, 0, 30); 
    tCtx.closePath(); tCtx.fill();
    
    // Lower teeth
    tCtx.fillStyle = C_BG;
    for (let j = 15; j < 80; j += 9) {
      tCtx.beginPath(); tCtx.moveTo(j, 1); tCtx.lineTo(j-2, -8); tCtx.lineTo(j+4, 1); tCtx.fill();
    }
    tCtx.restore(); 
    
    // Skull Decals / Negative Space
    tCtx.fillStyle = C_BG;
    tCtx.beginPath(); tCtx.ellipse(35, -20, 12, 8, -0.2, 0, Math.PI*2); tCtx.fill();
    tCtx.fillStyle = C_MAIN; 
    tCtx.beginPath(); tCtx.arc(38, -20, 3, 0, Math.PI*2); tCtx.fill();
    tCtx.fillStyle = C_BG; tCtx.fillRect(37.5, -22, 1, 4);
    tCtx.beginPath(); tCtx.moveTo(55, -20); tCtx.lineTo(70, -15); tCtx.lineTo(65, -5); tCtx.lineTo(50, -8); tCtx.fill();
    tCtx.beginPath(); tCtx.ellipse(88, -12, 4, 2, Math.PI/6, 0, Math.PI*2); tCtx.fill();

    // Draw Front Leg
    drawLeg(rightLegRot, C_MAIN); 
    
    let img = new Image();
    img.src = canvas.toDataURL('image/png');
    frameArray.push(img);
  }
}

function drawTrex() {
  if (!trex.active) return;
  const frameIndex = Math.floor(gameTime / 6) % 8; // Animation speed
  const isBiting = trex.stayTimer > 0 && trex.stayTimer < 150 && Math.sin(gameTime * 0.1) > 0;
  const frameList = isBiting ? trexBiteFrames : trexRunFrames;
  
  if (frameList[frameIndex] && frameList[frameIndex].complete) {
    ctx.save();
    // Offset translation maps the exact coordinate cx=400, cy=180 inside the 0.8 canvas to match trex.x
    ctx.translate(trex.x - 320, GROUND_Y - 170); 
    ctx.scale(0.8, 0.8);
    ctx.drawImage(frameList[frameIndex], 0, 0);
    ctx.restore();
  }
}

// GOLDEN EGG, FIREWORKS, STAGE CLEAR
// ============================================================
function spawnGoldenEgg() { goldenEgg.x = W + 300; goldenEgg.y = GROUND_Y - 25; goldenEgg.active = true; goldenEgg.glow = 0; }
function updateGoldenEgg() {
  if (!goldenEgg.active) return;
  goldenEgg.x -= gameSpeed; goldenEgg.glow += 0.08;
  if (gameTime % 3 === 0) sparkles.push({ x: goldenEgg.x + (Math.random()-0.5)*40, y: goldenEgg.y - 15 + (Math.random()-0.5)*30, vx: (Math.random()-0.5), vy: -Math.random()*1.5, life: 1, size: 1+Math.random()*2 });
}
function drawGoldenEgg() {
  if (!goldenEgg.active) return;
  ctx.save(); ctx.translate(goldenEgg.x, goldenEgg.y - 20);
  const pulse = Math.sin(goldenEgg.glow)*0.3+1.0;
  const grd = ctx.createRadialGradient(0,0,5,0,0,35*pulse);
  grd.addColorStop(0,'rgba(255,215,0,0.6)'); grd.addColorStop(0.5,'rgba(255,180,0,0.2)'); grd.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(-40,-40,80,80);
  ctx.beginPath(); ctx.ellipse(0,0,14*pulse,20*pulse,0,0,Math.PI*2); ctx.fillStyle='#FFD700'; ctx.fill(); ctx.strokeStyle='#B8860B'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-3,-5,4,8,-0.3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
  ctx.fillStyle='#B8860B'; ctx.beginPath(); ctx.arc(5,3,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-2,8,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-8,2,0,Math.PI*2); ctx.fill();
  // Crown pattern
  ctx.strokeStyle='#FFE44D'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-6,2); ctx.lineTo(-4,-3); ctx.lineTo(0,1); ctx.lineTo(4,-3); ctx.lineTo(6,2); ctx.stroke();
  ctx.restore();
}
function updateSparkles() { for(let i=sparkles.length-1;i>=0;i--){const s=sparkles[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.03;s.size*=0.98;if(s.life<=0)sparkles.splice(i,1);} }
function drawSparkles() { for(const s of sparkles){ctx.fillStyle=`rgba(255,215,0,${s.life})`;ctx.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);} }
function spawnFirework(x,y){
  const cols=['#FFD700','#FF4444','#44AAFF','#FF44FF','#44FF44','#FFF'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<40;i++){const a=(i/40)*Math.PI*2+Math.random()*0.3,sp=2+Math.random()*4;fireworks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:col,size:1.5+Math.random()*2});}
}
function updateFireworks(){for(let i=fireworks.length-1;i>=0;i--){const f=fireworks[i];f.x+=f.vx;f.y+=f.vy;f.vy+=0.05;f.life-=0.015;f.vx*=0.98;f.vy*=0.98;if(f.life<=0)fireworks.splice(i,1);}}
function drawFireworks(){for(const f of fireworks){ctx.globalAlpha=f.life;ctx.fillStyle=f.color;ctx.fillRect(f.x-f.size/2,f.y-f.size/2,f.size,f.size);}ctx.globalAlpha=1;}
function triggerStageClear(){state='stageclear';stageClearTimer=120;obstacles.length=0;pterodactyls.length=0;trex.active=false;trex.x=-300;rainParticles.length=0;stageCleared=true;}
function triggerGoalCelebration(){
  state='goalcelebration';celebrationTimer=300;goldenEgg.active=false;
  for(let i=0;i<12;i++) setTimeout(()=>spawnFirework(80+Math.random()*(W-160),30+Math.random()*80),i*300);
  shakeTimer=15;shakeIntensity=5;
}

// ============================================================
// BONUS STAGE SYSTEM
// ============================================================
function getBonusGroundY(screenX){const wx=screenX+bonusScroll;return GROUND_Y-Math.sin(wx*0.006)*35-Math.sin(wx*0.014)*18-Math.sin(wx*0.003)*22+Math.sin(wx*0.025)*8;}
function startBonusStage(){
  state='bonus';bonusScroll=0;bonusScore=0;bonusCoins=[];bonusCoinTimer=50;
  bonusObstacles=[];bonusObstacleTimer=100;
  fireworks.length=0;sparkles.length=0;goldenEgg.active=false;
  darkness=0;lightningFlash=0;rainParticles.length=0;dust.length=0;
  obstacles.length=0;pterodactyls.length=0;trex.active=false;
  gameSpeed=3;gameTime=0;buggy.x=150;buggy.y=getBonusGroundY(150);
  buggy.vy=0;buggy.grounded=true;buggy.jumpHeld=false;buggy.jumpTime=0;
  buggy.dashActive=0;buggy.canDash=false;dashRequested=false;
}
function spawnBonusCoin(){const x=W+30+Math.random()*100;bonusCoins.push({x,y:getBonusGroundY(x)-25-Math.random()*30,sparkle:Math.random()*Math.PI*2});}
function spawnBonusObstacle(){
  const x=W+40;
  // Check slope: if uphill, don't spawn (player can't dodge)
  const slope=getBonusGroundY(x+20)-getBonusGroundY(x-20);
  if(slope<-3) return; // Uphill detected, skip spawn
  
  const r=Math.random();
  if(r<0.35){
    // Scorpion - small animated critter
    bonusObstacles.push({type:'scorpion',x,w:22,h:14,seed:Math.random(),anim:Math.random()*Math.PI*2});
  } else if(r<0.65){
    // Bone pile - skulls and bones
    bonusObstacles.push({type:'bones',x,w:28,h:16,seed:Math.random(),anim:0});
  } else {
    // Rolling boulder
    bonusObstacles.push({type:'boulder',x,w:20,h:20,seed:Math.random(),roll:0});
  }
}
function updateBonusStage(){
  gameTime++;gameSpeed=Math.min(9,3+gameTime*0.0003);bonusScroll+=gameSpeed;
  bonusScore=Math.floor(bonusScroll*0.08);
  const terrainY=getBonusGroundY(buggy.x);
  if(!buggy.grounded){buggy.vy+=GRAVITY;buggy.y+=buggy.vy;}
  // Snap to terrain when close enough and falling or stationary
  if(buggy.y>=terrainY-3&&buggy.vy>=0){if(!buggy.grounded&&buggy.vy>2){spawnDust(buggy.x-20,terrainY,true);spawnDust(buggy.x+28,terrainY,true);}buggy.y=terrainY;buggy.vy=0;buggy.grounded=true;}
  // Only become airborne if clearly above terrain (very generous 15px threshold)
  else if(buggy.y<terrainY-15){buggy.grounded=false;}
  // When grounded, continuously track the terrain surface
  if(buggy.grounded){buggy.y=terrainY;}
  buggy.wheelAngle+=gameSpeed*0.16;
  if(buggy.grounded&&gameTime%3===0)spawnDust(buggy.x-22,buggy.y-2);
  if(dashRequested&&buggy.canDash){buggy.canDash=false;dashRequested=false;buggy.dashActive=20;buggy.vy=-1.0;if(typeof playDash==='function')playDash();}
  if(buggy.dashActive>0){buggy.dashActive--;buggy.vy=0;buggy.x+=4.5;dust.push({x:buggy.x-30,y:buggy.y-8+Math.random()*6,vx:-6-Math.random()*2,vy:(Math.random()-0.5)*0.5,life:1.2,size:4});}
  const tgtX=150;if(buggy.x<tgtX)buggy.x+=1.5;if(buggy.x>tgtX+50)buggy.x-=5.0;
  processJumpHold();updateDust();
  bonusCoinTimer-=gameSpeed;if(bonusCoinTimer<=0){spawnBonusCoin();bonusCoinTimer=60+Math.random()*120;}
  for(let i=bonusCoins.length-1;i>=0;i--){bonusCoins[i].x-=gameSpeed;bonusCoins[i].sparkle+=0.1;if(bonusCoins[i].x<-30)bonusCoins.splice(i,1);}
  bonusObstacleTimer-=gameSpeed;if(bonusObstacleTimer<=0){spawnBonusObstacle();bonusObstacleTimer=180+Math.random()*300;}
  for(let i=bonusObstacles.length-1;i>=0;i--){const o=bonusObstacles[i];o.x-=gameSpeed;if(o.type==='boulder')o.roll+=gameSpeed*0.12;if(o.type==='scorpion')o.anim+=0.12;if(o.x<-50){bonusObstacles[i]=bonusObstacles[bonusObstacles.length-1];bonusObstacles.pop();}}
  checkBonusCollisions();
}
function checkBonusCollisions(){
  const bL=buggy.x-15,bR=buggy.x+20,bT=buggy.y-26,bB=buggy.y;
  for(let i=bonusCoins.length-1;i>=0;i--){const c=bonusCoins[i];if(Math.abs(buggy.x-c.x)<25&&Math.abs(buggy.y-10-c.y)<25){bonusCoins.splice(i,1);bonusScore+=10;for(let j=0;j<8;j++)sparkles.push({x:c.x+(Math.random()-0.5)*10,y:c.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:1,size:2+Math.random()});if(typeof playMilestone==='function')playMilestone();}}
  for(const o of bonusObstacles){const gy=getBonusGroundY(o.x),oL=o.x-o.w/2+3,oR=o.x+o.w/2-3,oT=gy-o.h,oB=gy;
    if(bR>oL&&bL<oR&&bB>oT&&bT<oB){if(buggy.dashActive>0){o.x=-999;if(typeof playCrash==='function')playCrash();}else{triggerBonusGameOver();return;}}}
  if(buggy.y>H+50)triggerBonusGameOver();
}
function triggerBonusGameOver(){
  state='gameover';score=bonusScore;if(typeof playCrash==='function')playCrash();shakeTimer=20;shakeIntensity=8;
  if(bonusScore>highScore){highScore=bonusScore;try{localStorage.setItem('jungleBuggyHS',highScore);}catch(e){}}
}
function drawBonusBackground(){
  // Monochrome sky matching Stage 1
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  // Distant desert mountains (far parallax, monochrome silhouette)
  ctx.fillStyle=COL_FAR;ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=4){const wx=x+bonusScroll*0.05;ctx.lineTo(x,H-(80+Math.sin(wx*0.004)*35+Math.sin(wx*0.011)*20+Math.abs(Math.sin(wx*0.002))*25));}ctx.lineTo(W,H);ctx.fill();
  // Mid mesa silhouettes
  ctx.fillStyle=COL_MID;ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=3){const wx=x+bonusScroll*0.15;const h=50+Math.sin(wx*0.007)*22+Math.abs(Math.sin(wx*0.003))*28;ctx.lineTo(x,H-h);}ctx.lineTo(W,H);ctx.fill();
  // Near dune crests
  ctx.fillStyle=COL_NEAR;ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=3){const wx=x+bonusScroll*0.4;const h=35+Math.sin(wx*0.01)*15+Math.sin(wx*0.006)*10;ctx.lineTo(x,H-h);}ctx.lineTo(W,H);ctx.fill();
  // Scattered dead trees on mid layer
  ctx.strokeStyle=COL_MID;ctx.lineWidth=2;
  for(let i=0;i<5;i++){const tx=((i*173+bonusScroll*0.15)%W);const ty=H-(50+Math.sin((tx+bonusScroll*0.15)*0.007)*22);
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-2,ty-20);ctx.moveTo(tx-2,ty-14);ctx.lineTo(tx-8,ty-20);
    ctx.moveTo(tx-2,ty-10);ctx.lineTo(tx+5,ty-16);ctx.stroke();}
}
function drawBonusTerrain(){
  // Ground fill in monochrome
  ctx.fillStyle=COL;ctx.beginPath();ctx.moveTo(0,H);for(let x=0;x<=W;x+=2)ctx.lineTo(x,getBonusGroundY(x));ctx.lineTo(W,H);ctx.fill();
  // Surface highlight line
  ctx.strokeStyle=COL_MID;ctx.lineWidth=1;ctx.beginPath();for(let x=0;x<=W;x+=2){const y=getBonusGroundY(x);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  // Terrain strata lines
  ctx.strokeStyle=BG;ctx.lineWidth=0.5;ctx.globalAlpha=0.15;
  for(let layer=1;layer<=3;layer++){ctx.beginPath();for(let x=0;x<=W;x+=3){const y=getBonusGroundY(x)+layer*10;if(y<H){x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}}ctx.stroke();}
  ctx.globalAlpha=1;
}
function drawBonusObstacles(){
  for(const o of bonusObstacles){if(o.x<-50||o.x>W+50)continue;const gy=getBonusGroundY(o.x);ctx.save();ctx.translate(o.x,gy);
    if(o.type==='scorpion'){
      // Animated desert scorpion silhouette
      ctx.fillStyle=COL;ctx.strokeStyle=COL;ctx.lineWidth=1.5;
      const clawAnim=Math.sin(o.anim)*0.3;
      // Body segments
      ctx.beginPath();ctx.ellipse(0,-4,8,3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-4,-5,3,2.5,0.2,0,Math.PI*2);ctx.fill();
      // Head
      ctx.beginPath();ctx.ellipse(-9,-5,3,2.5,0,0,Math.PI*2);ctx.fill();
      // Left claw
      ctx.save();ctx.translate(-12,-6);ctx.rotate(-0.5+clawAnim);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-6,-2);ctx.lineTo(-4,-5);ctx.lineTo(-2,-3);ctx.lineTo(-1,-6);ctx.lineTo(1,-3);ctx.closePath();ctx.fill();
      ctx.restore();
      // Right claw
      ctx.save();ctx.translate(-10,-3);ctx.rotate(0.3-clawAnim);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-5,1);ctx.lineTo(-4,4);ctx.lineTo(-2,2);ctx.lineTo(-1,5);ctx.lineTo(1,2);ctx.closePath();ctx.fill();
      ctx.restore();
      // Tail (curved upward with stinger)
      ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(6,-4);
      ctx.quadraticCurveTo(10,-5,12,-8);ctx.quadraticCurveTo(13,-12,10,-14);
      ctx.stroke();
      // Stinger
      ctx.fillStyle=COL;ctx.beginPath();ctx.moveTo(10,-14);ctx.lineTo(8,-17);ctx.lineTo(12,-15);ctx.fill();
      // Legs (4 pairs)
      ctx.lineWidth=1;
      for(let i=0;i<4;i++){const lx=-6+i*4,la=Math.sin(o.anim+i*1.5)*0.4;
        ctx.beginPath();ctx.moveTo(lx,-2);ctx.lineTo(lx+3*Math.cos(la),2+Math.abs(Math.sin(la))*2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(lx,-6);ctx.lineTo(lx-3*Math.cos(la),-9-Math.abs(Math.sin(la))*2);ctx.stroke();}
      // Eyes
      ctx.fillStyle=BG;ctx.fillRect(-11,-6,1,1);ctx.fillRect(-9,-6,1,1);
    } else if(o.type==='bones'){
      // Scattered bone pile with skull
      ctx.fillStyle=COL;ctx.strokeStyle=COL;ctx.lineWidth=1;
      // Skull (front-facing)
      ctx.beginPath();ctx.arc(0,-10,6,0,Math.PI*2);ctx.fill();
      // Eye sockets
      ctx.fillStyle=BG;
      ctx.beginPath();ctx.ellipse(-2.5,-11,1.8,2.2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(2.5,-11,1.8,2.2,0,0,Math.PI*2);ctx.fill();
      // Nose
      ctx.beginPath();ctx.moveTo(-0.5,-8.5);ctx.lineTo(0.5,-8.5);ctx.lineTo(0,-7.5);ctx.fill();
      // Jaw teeth
      ctx.fillStyle=BG;ctx.fillRect(-3,-6,6,1.5);
      ctx.fillStyle=COL;
      for(let i=0;i<4;i++)ctx.fillRect(-2.5+i*1.5,-6,0.8,2);
      // Scattered bones around skull
      ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-10,-2);ctx.lineTo(-4,-4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(5,-3);ctx.lineTo(12,-1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-3,-1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(9,-2);ctx.stroke();
      // Rib bone
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-2,-3);ctx.quadraticCurveTo(0,-6,2,-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-3,-2);ctx.quadraticCurveTo(0,-5,3,-2);ctx.stroke();
      ctx.lineCap='butt';
    } else if(o.type==='boulder'){
      // Rolling boulder with cracks
      const r=o.h/2;
      ctx.save();ctx.translate(0,-r);ctx.rotate(o.roll||0);
      ctx.fillStyle=COL;ctx.strokeStyle=COL;ctx.lineWidth=1.5;
      // Irregular rocky shape
      ctx.beginPath();
      for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2,rad=r*(0.8+Math.sin(a*3+o.seed*10)*0.2);
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);}
      ctx.closePath();ctx.fill();
      // Surface cracks (BG color)
      ctx.strokeStyle=BG;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-r*0.3,-r*0.2);ctx.lineTo(r*0.1,r*0.3);ctx.moveTo(r*0.2,-r*0.1);ctx.lineTo(-r*0.1,r*0.2);
      ctx.moveTo(r*0.3,-r*0.3);ctx.lineTo(r*0.1,0);ctx.stroke();
      // Highlight edge
      ctx.strokeStyle=BG;ctx.lineWidth=0.5;ctx.globalAlpha=0.3;
      ctx.beginPath();ctx.arc(0,0,r*0.85,Math.PI*0.8,Math.PI*1.6);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.restore();
    }
  ctx.restore();}
}

function checkCollisions() {
  // Vehicle bounding box (Scaled down by 0.55)
  const bL = buggy.x - 15, bR = buggy.x + 20;
  const bT = buggy.y - 26, bB = buggy.y;

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    const oL = o.x - o.w * 0.5 + 4, oR = o.x + o.w * 0.5 - 4;
    const oT = o.y - o.h + 5, oB = o.y; // +5 margin so driving on top avoids side pushback
    if (bR > oL && bL < oR && bB > oT && bT < oB) {
      if (buggy.dashActive && buggy.dashActive > 0) {
        // Vaporize obstacle via nitrous thruster!
        obstacles.splice(i, 1);
        if (typeof playCrash === 'function') playCrash(); 
      } else {
        // Push buggy backward
        const pushX = oL - 20;
        if (buggy.x > pushX) buggy.x = pushX;
      }
    }
  }

  // Left screen boundary check
  if (buggy.x < 15) {
    triggerGameOver(); return;
  }

  for (let i = pterodactyls.length - 1; i >= 0; i--) {
    const p = pterodactyls[i];
    const pL = p.x - 22, pR = p.x + 13;
    const pT = p.y - 8, pB = p.y + 6;
    if (bR > pL && bL < pR && bB > pT && bT < pB) { 
      if (buggy.dashActive > 0) {
        // Vaporize Pterodactyl natively with nitrous thruster kinetic impact!
        pterodactyls.splice(i, 1);
        if (typeof playCrash === 'function') playCrash(); 
      } else {
        triggerGameOver(); return; 
      }
    }
  }
}

function triggerGameOver() {
  if (state !== 'playing') return;
  state = 'gameover';
  if (typeof playCrash === 'function') playCrash();
  shakeTimer = 20; shakeIntensity = 8;
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem('jungleBuggyHS', highScore); } catch(e) {}
  }
}

// AUDIO SYSTEM (Web Audio API Synth)
// ============================================================
let audioCtx;
let audioEnabled = false;

function toggleMute(e) {
  if (e) e.stopPropagation();
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  btn.innerText = isMuted ? '解除' : '消音';
  
  if (!audioEnabled) {
    initAudio();
  }
  
  if (audioCtx) {
    if (isMuted) {
      audioCtx.suspend();
    } else {
      audioCtx.resume();
    }
  }
}

function initAudio() {
  if (!audioEnabled) {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      audioCtx.resume();
      audioEnabled = true;
      initContinuousSounds(); 
    } catch(e) {}
  }
}

function playTone(freq, type, duration, vol=0.1, slideFreq=null) {
  if (!audioEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
  
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playJump() { 
  if (!audioEnabled) return;
  const t = audioCtx.currentTime;

  // Generate 0.2s of White Noise for entirely physical acoustic hits
  const bufferSize = Math.floor(audioCtx.sampleRate * 0.2); 
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

  // 1. Physical Chassis Thud / Weight Shifting
  // Pure low sine punch without any video-gamey pitch sweeping!
  const thud = audioCtx.createOscillator();
  thud.type = 'sine';
  thud.frequency.setValueAtTime(50, t); 
  
  const thudGain = audioCtx.createGain();
  thudGain.gain.setValueAtTime(1.0, t); // Hard start
  thudGain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  
  thud.connect(thudGain);
  thudGain.connect(audioCtx.destination);
  thud.start(t);
  thud.stop(t + 0.15);

  // 2. High Resonance Metal Clack (Atonal impact)
  // Filtering white noise through a high Q bandpass perfectly simulates striking a steel object
  const metalSource = audioCtx.createBufferSource();
  metalSource.buffer = noiseBuffer;
  
  const metalFilter = audioCtx.createBiquadFilter();
  metalFilter.type = 'bandpass';
  metalFilter.frequency.setValueAtTime(1200, t);
  metalFilter.Q.value = 30.0; // Extreme resonance rings the noise into a metallic hit
  
  const metalGain = audioCtx.createGain();
  metalGain.gain.setValueAtTime(1.5, t); // Sharp hit
  metalGain.gain.exponentialRampToValueAtTime(0.01, t + 0.05); // Super fast decay
  
  metalSource.connect(metalFilter);
  metalFilter.connect(metalGain);
  metalGain.connect(audioCtx.destination);
  metalSource.start(t);

  // 3. Lower Sub-Structure Clatter
  const clatterSource = audioCtx.createBufferSource();
  clatterSource.buffer = noiseBuffer;
  
  const clatterFilter = audioCtx.createBiquadFilter();
  clatterFilter.type = 'bandpass';
  clatterFilter.frequency.setValueAtTime(450, t);
  clatterFilter.Q.value = 15.0; // Deeper steel ring
  
  const clatterGain = audioCtx.createGain();
  clatterGain.gain.setValueAtTime(2.0, t);
  clatterGain.gain.exponentialRampToValueAtTime(0.01, t + 0.08); // Slightly longer decay than clack
  
  clatterSource.connect(clatterFilter);
  clatterFilter.connect(clatterGain);
  clatterGain.connect(audioCtx.destination);
  clatterSource.start(t);

  // 4. Subtle Air Compression Hiss
  const airSource = audioCtx.createBufferSource();
  airSource.buffer = noiseBuffer;
  
  const airFilter = audioCtx.createBiquadFilter();
  airFilter.type = 'bandpass';
  airFilter.frequency.setValueAtTime(4000, t);
  airFilter.Q.value = 0.5; // Wide hiss
  
  const airGain = audioCtx.createGain();
  airGain.gain.setValueAtTime(0.15, t); // Very subtle
  airGain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  
  airSource.connect(airFilter);
  airFilter.connect(airGain);
  airGain.connect(audioCtx.destination);
  airSource.start(t);
}

function playDash() {
  if (!audioEnabled) return;
  const t = audioCtx.currentTime;
  
  // Massive high-pressure NO2 pneumatic release
  const bufferSize = Math.floor(audioCtx.sampleRate * 0.3); 
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
  const hissSource = audioCtx.createBufferSource();
  hissSource.buffer = noiseBuffer;
  
  const hissFilter = audioCtx.createBiquadFilter();
  hissFilter.type = 'highpass';
  hissFilter.frequency.value = 5000;
  
  const hissGain = audioCtx.createGain();
  hissGain.gain.setValueAtTime(0.8, t);
  hissGain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  
  hissSource.connect(hissFilter);
  hissFilter.connect(hissGain);
  hissGain.connect(audioCtx.destination);
  hissSource.start(t);

  // High-pitch Turbine Whine
  const whine = audioCtx.createOscillator();
  whine.type = 'sawtooth';
  whine.frequency.setValueAtTime(400, t);
  whine.frequency.exponentialRampToValueAtTime(1400, t + 0.25);
  
  const whineGain = audioCtx.createGain();
  whineGain.gain.setValueAtTime(0.4, t);
  whineGain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  
  whine.connect(whineGain);
  whineGain.connect(audioCtx.destination);
  whine.start(t);
  whine.stop(t + 0.3);
}

function playCrash() { 
  playTone(150, 'sawtooth', 0.5, 0.15, 40); 
  playTone(100, 'square', 0.4, 0.1, 20); 
}

function playMilestone() {
  if (!audioEnabled) return;
  const t = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + i*0.1 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i*0.1 + 0.2);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t + i*0.1); osc.stop(t + i*0.1 + 0.2);
  });
}

function playTrexRoar() {
  if (!audioEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.5);
  // frequency modulation
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 15;
  const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 20; 
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency); lfo.start();
  
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.2);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
  
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 1.5);
  lfo.stop(audioCtx.currentTime + 1.5);
}

let engineNodes = {};
let rainSource = null, rainGain = null;

function initContinuousSounds() {
  if (engineNodes.masterGain) return;

  // Master Engine Volume
  engineNodes.masterGain = audioCtx.createGain();
  engineNodes.masterGain.gain.value = 0;
  engineNodes.masterGain.connect(audioCtx.destination);

  // 1. Sub-oscillator for bass presence
  const subOsc = audioCtx.createOscillator();
  subOsc.type = 'triangle';
  subOsc.frequency.value = 30;
  const subGain = audioCtx.createGain();
  subGain.gain.value = 0.8;
  subOsc.connect(subGain);
  subGain.connect(engineNodes.masterGain);
  subOsc.start();

  // 2. Main Combustion (Exhaust)
  const masterOsc = audioCtx.createOscillator();
  masterOsc.type = 'sawtooth';
  masterOsc.frequency.value = 60;
  
  const exhaustFilter = audioCtx.createBiquadFilter();
  exhaustFilter.type = 'lowpass';
  exhaustFilter.frequency.value = 150; 
  exhaustFilter.Q.value = 3.0; // Throaty resonance
  
  masterOsc.connect(exhaustFilter);
  const exhaustGain = audioCtx.createGain();
  exhaustGain.gain.value = 0.5;
  exhaustFilter.connect(exhaustGain);
  exhaustGain.connect(engineNodes.masterGain);
  masterOsc.start();

  // 3. Mechanical whining/grit (gears)
  const whineOsc = audioCtx.createOscillator();
  whineOsc.type = 'square';
  whineOsc.frequency.value = 120;
  
  const whineFilter = audioCtx.createBiquadFilter();
  whineFilter.type = 'bandpass';
  whineFilter.frequency.value = 800; // mid-high whine
  whineFilter.Q.value = 1.0;
  
  whineOsc.connect(whineFilter);
  const whineGain = audioCtx.createGain();
  whineGain.gain.value = 0.05; // subtle gear noise
  whineFilter.connect(whineGain);
  whineGain.connect(engineNodes.masterGain);
  whineOsc.start();

  // 4. LFO (Low Frequency Oscillator) simulating engine cylinder firing irregularity
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 10; // RPM firing rate
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 50; // Sweeps the exhaust cutoff by 50Hz for realistic rumble
  lfo.connect(lfoGain);
  lfoGain.connect(exhaustFilter.frequency);
  lfo.start();

  // Save for dynamic updates
  engineNodes.sub = subOsc;
  engineNodes.main = masterOsc;
  engineNodes.whine = whineOsc;
  engineNodes.lfo = lfo;
  engineNodes.exhaustFilter = exhaustFilter;
  engineNodes.whineFilter = whineFilter;
  engineNodes.currentRPM = 1.0;

  // Rain Setup (White Noise Generation)
  const bufferSize = audioCtx.sampleRate * 2; 
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
  
  rainSource = audioCtx.createBufferSource();
  rainSource.buffer = noiseBuffer;
  rainSource.loop = true;
  
  const rainFilter = audioCtx.createBiquadFilter();
  rainFilter.type = 'highpass';
  rainFilter.frequency.value = 800; // Hiss / Splatter frequency
  
  rainGain = audioCtx.createGain();
  rainGain.gain.value = 0;
  
  rainSource.connect(rainFilter);
  rainFilter.connect(rainGain);
  rainGain.connect(audioCtx.destination);
  rainSource.start();
}

function updateAudio() {
  if (!audioEnabled || !engineNodes.masterGain || !rainGain) return;
  
  if (state === 'playing') {
    const normalizedSpeed = Math.max(0, (gameSpeed - START_SPEED) / (MAX_SPEED - START_SPEED));
    let targetRpm = 1.0 + normalizedSpeed * 2.0; // scales from 1x idle to 3x scream
    if (!buggy.grounded) targetRpm += 0.8; // Engine screaming mid-air without ground friction
    
    engineNodes.currentRPM += (targetRpm - engineNodes.currentRPM) * 0.15;
    let rpm = engineNodes.currentRPM;

    engineNodes.sub.frequency.value = 30 * rpm;
    engineNodes.main.frequency.value = 60 * rpm;
    engineNodes.whine.frequency.value = 120 * rpm;
    
    engineNodes.exhaustFilter.frequency.value = 120 + rpm * 120;
    engineNodes.whineFilter.frequency.value = 600 + rpm * 400;
    engineNodes.lfo.frequency.value = 10 * rpm; // RPM combustion rate
    
    engineNodes.masterGain.gain.value += (0.1 - engineNodes.masterGain.gain.value) * 0.1;
  } else {
    // Engine dies down and idles
    engineNodes.currentRPM += (0.5 - engineNodes.currentRPM) * 0.05;
    let rpm = engineNodes.currentRPM;
    
    engineNodes.sub.frequency.value = 30 * rpm;
    engineNodes.main.frequency.value = 60 * rpm;
    engineNodes.whine.frequency.value = 120 * rpm;
    engineNodes.exhaustFilter.frequency.value = 100;
    engineNodes.lfo.frequency.value = 5;
    
    engineNodes.masterGain.gain.value += (0 - engineNodes.masterGain.gain.value) * 0.1;
  }

  let targetRainVol = 0;
  if (rainParticles.length > 0) {
    targetRainVol = Math.min(0.01 + rainParticles.length * 0.0003, 0.08); 
  }
  rainGain.gain.value += (targetRainVol - rainGain.gain.value) * 0.05;
}

function handleJumpStart() {
  initAudio();
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { state = 'title'; return; }
  if (state === 'goalcelebration') { startBonusStage(); return; }
  if (state === 'playing' || state === 'bonus') {
    if (buggy.grounded) {
      buggy.vy = JUMP_VEL; buggy.grounded = false;
      buggy.jumpHeld = true; buggy.jumpTime = 0;
      buggy.canDash = true;
      if (typeof playJump === 'function') playJump();
    } else if (buggy.canDash) {
      dashRequested = true;
    }
  }
}
function handleJumpEnd() { buggy.jumpHeld = false; }

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!e.repeat) handleJumpStart(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') handleJumpEnd();
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); handleJumpStart(); });
canvas.addEventListener('mouseup', handleJumpEnd);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJumpStart(); }, { passive: false });
canvas.addEventListener('touchend', handleJumpEnd);

function processJumpHold() {
  if (buggy.jumpHeld && !buggy.grounded && buggy.jumpTime < 12) {
    buggy.jumpTime++;
    if (buggy.vy < 0) { buggy.vy -= 0.55; buggy.vy = Math.max(buggy.vy, HIGH_JUMP_VEL); }
  }
}

function startGame() {
  state = 'playing'; score = 0;
  gameSpeed = START_SPEED; gameTime = 0;
  obstacles.length = 0; pterodactyls.length = 0; dust.length = 0;
  rainParticles.length = 0; lightningFlash = 0; darkness = 0;
  obstacleTimer = 250; pteroTimer = 500;
  stageCleared = false; goldenEgg.active = false;
  fireworks.length = 0; sparkles.length = 0;
  resetBuggy(); resetTrex();
}

  ctx.fillStyle = `hsl(${hue}, 80%, 60%)`; ctx.font = 'bold 36px "Courier New", monospace';
  ctx.fillText('★ GOAL!! ★', W / 2, H / 2 - 40);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 20px "Courier New", monospace';
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), W / 2, H / 2);
  ctx.fillStyle = COL_MID; ctx.font = '12px "Courier New", monospace';
  if (Math.sin(Date.now() * 0.005) > 0) ctx.fillText('PRESS SPACE FOR BONUS STAGE', W / 2, H / 2 + 35);
}

function drawBonusScore() {
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px "Courier New", monospace'; ctx.textAlign = 'right';
  ctx.fillText('BONUS ' + String(bonusScore).padStart(5, '0'), W - 20, 25);
  ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(W - 105, 20, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFF8DC'; ctx.font = '10px "Courier New", monospace'; ctx.textAlign = 'left';
  ctx.fillText('★ BONUS STAGE ★', 15, 25);
}

// ============================================================
// MILESTONE
// ============================================================
let lastMilestone = 0;
function checkMilestone() {
  const ms = Math.floor(score / 100) * 100;
  if (ms > lastMilestone && ms > 0) {
    lastMilestone = ms;
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
initMountains();
initJungleMid();
initJungleNear();
initJungleVNear();
initGround();

function update() {
  const muteBtn = document.getElementById('mute-btn');
  if (muteBtn) {
    muteBtn.style.display = (state === 'title') ? 'block' : 'none';
  }
  
  if (state === 'playing') {
    gameTime++;
    gameSpeed = Math.min(MAX_SPEED, START_SPEED + gameTime * SPEED_RAMP);
    score = Math.floor(gameTime * 0.12);

    scrollFar += gameSpeed * 0.05;
    scrollMid += gameSpeed * 0.25;
    scrollNear += gameSpeed;
    scrollVNear += gameSpeed * 1.55; // Extreme foreground speed

    processJumpHold();
    updateBuggy();
    updateDust();
    updateObstacles();
    updatePterodactyls();
    updateTrex();
    checkCollisions();
    checkMilestone();
    
    // ================== SCORE PROGRESSION SYSTEM ==================
    // 600+: Night Time Fade
    if (score >= 600) {
      darkness = Math.min(0.85, darkness + 0.002); // Gradual night fade in
    } else {
      darkness = Math.max(0, darkness - 0.002); // Gradual day fade in
    }

    // 400+: Rain & Thunder
    if (score >= 400) {
      // 0.3% chance of lightning per frame if raining
      if (Math.random() < 0.003) {
        lightningFlash = 1.0;
        shakeTimer = 10; shakeIntensity = 3; // Thunder shake
      }
      // Rain spawning (capped at 150 particles)
      if (rainParticles.length < 150) {
        for(let i=0; i<3; i++) {
           rainParticles.push({
             x: Math.random() * W * 2.0, y: -20,
             vx: -4 - Math.random() * 4 - gameSpeed * 0.7,
             vy: 20 + Math.random() * 12
           });
        }
      }
    }
    
    if (lightningFlash > 0) lightningFlash = Math.max(0, lightningFlash - 0.05);
    for(let i=rainParticles.length-1;i>=0;i--){let p=rainParticles[i];p.x+=p.vx;p.y+=p.vy;if(p.y>H||p.x<-50){rainParticles[i]=rainParticles[rainParticles.length-1];rainParticles.pop();}}

    // FINAL PHASE: T-REX returns with high urgency from 800-950
    if (score >= 800 && score < 950 && !trex.active && !stageCleared) {
      trex.active = true; trex.x = -220; 
      trex.speed = gameSpeed * 1.5; // Aggressive!
      trex.stayTimer = 500; // Stay until stage clear trigger
      if (typeof playTrexRoar === 'function') playTrexRoar();
    }

    // Stage Clear / Final Peace at score 950
    if (score >= 950 && !stageCleared) { triggerStageClear(); }
  } else if (state === 'stageclear') {
    gameTime++; darkness = Math.max(0, darkness - 0.01);
    scrollFar += gameSpeed * 0.05; scrollMid += gameSpeed * 0.25; scrollNear += gameSpeed; scrollVNear += gameSpeed * 1.55;
    updateBuggy(); updateDust(); stageClearTimer--;
    if (stageClearTimer <= 0) { state = 'goalrun'; spawnGoldenEgg(); }
  } else if (state === 'goalrun') {
    gameTime++;
    scrollFar += gameSpeed * 0.05; scrollMid += gameSpeed * 0.25; scrollNear += gameSpeed; scrollVNear += gameSpeed * 1.55;
    updateBuggy(); updateGoldenEgg(); updateSparkles(); updateDust();
    // Reaching score 1000 near the Golden Egg
    if (goldenEgg.active && score >= 1000 && Math.abs(buggy.x - (goldenEgg.x + 30)) < 60) { triggerGoalCelebration(); }
  } else if (state === 'goalcelebration') {
    gameTime++; updateFireworks(); updateSparkles();
    scrollFar += gameSpeed * 0.02; scrollMid += gameSpeed * 0.1;
    if (gameTime % 25 === 0 && celebrationTimer > 0) spawnFirework(100+Math.random()*(W-200), 30+Math.random()*80);
    celebrationTimer--;
  } else if (state === 'bonus') {
    updateBonusStage(); updateSparkles();
  }
  if (shakeTimer > 0) { shakeTimer--; shakeIntensity *= 0.85; }
  if (typeof updateAudio === 'function') updateAudio(); // Update engine and environment audio
}

function draw() {
  ctx.save();
  if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);

  if (state === 'bonus') {
    // ===== BONUS STAGE RENDERING =====
    drawBonusBackground(); drawBonusTerrain(); drawBonusObstacles(); drawBonusCoins();
    drawDust(); drawBuggy(); drawSparkles(); drawBonusScore();
  } else {
    // ===== NORMAL STAGE RENDERING =====
    ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
    drawMountains(); drawJungleMid(); drawGround(); drawJungleNear();
    drawObstacles(); drawDust(); drawBuggy(); drawPterodactyls(); drawTrex();
    if (goldenEgg.active) drawGoldenEgg();
    drawSparkles(); drawFireworks();
    if (darkness > 0) {
      ctx.save();
      ctx.fillStyle = `rgba(10, 12, 16, ${darkness})`;
      ctx.beginPath(); ctx.moveTo(-50,-50); ctx.lineTo(W+50,-50); ctx.lineTo(W+50,H+50); ctx.lineTo(-50,H+50); ctx.closePath();
      const hx = buggy.x + 20, hy = buggy.y - 14, beamLen = W * 1.5;
      const pitch = buggy.grounded ? Math.sin(gameTime * 0.3) * 0.02 : (buggy.vy * 0.015);
      const angleTop = pitch - 0.25, angleBot = pitch + 0.15;
      const topX = hx + Math.cos(angleTop) * beamLen, topY = hy + Math.sin(angleTop) * beamLen;
      const botX = hx + Math.cos(angleBot) * beamLen, botY = hy + Math.sin(angleBot) * beamLen;
      ctx.moveTo(hx, hy); ctx.lineTo(botX, botY); ctx.lineTo(topX, topY); ctx.closePath(); ctx.fill('evenodd');
      ctx.globalCompositeOperation = 'screen';
      const grad = ctx.createLinearGradient(hx, hy, hx + 400, hy);
      grad.addColorStop(0, `rgba(255, 255, 255, ${darkness * 0.6})`); grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(botX, botY); ctx.lineTo(topX, topY); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    if (rainParticles.length > 0) {
      ctx.save(); const rainCol = darkness > 0.4 ? 'rgba(255,255,255,0.5)' : 'rgba(100,110,120,0.7)';
      ctx.strokeStyle = rainCol; ctx.lineWidth = darkness > 0.4 ? 1.5 : 2; ctx.beginPath();
      for (const p of rainParticles) { ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*1.5, p.y - p.vy*1.5); }
      ctx.stroke(); ctx.restore();
    }
    if (lightningFlash > 0) { ctx.fillStyle = `rgba(255,255,255,${lightningFlash})`; ctx.fillRect(-20,-20,W+40,H+40); }
    drawJungleVNear();
    drawScore();
  }
  ctx.restore();

  // Overlays
  if (state === 'title') drawTitle();
  if (state === 'gameover') drawGameOver();
  if (state === 'stageclear') drawStageClear();
  if (state === 'goalrun') { ctx.textAlign='center'; ctx.fillStyle='#FFD700'; ctx.font='bold 14px "Courier New",monospace'; ctx.fillText('>>> GOAL AHEAD >>>',W/2,30); }
  if (state === 'goalcelebration') drawGoalCelebration();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// Auto-start bonus stage if ?bonus=1 is in URL
if (new URLSearchParams(window.location.search).get('bonus') === '1') {
  initAudio();
  startBonusStage();
  document.title = 'BONUS STAGE TEST - Jungle Buggy Survival';
}

loop();
</script>
</body>
</html>
